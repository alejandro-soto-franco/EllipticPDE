name = "EllipticPdes"
version = "0.1.0"
keywords = ["math", "pde", "elliptic"]
defaultTargets = ["EllipticPdes"]

# Environment-level lint gate, mirroring Mathlib's own configuration. `lake lint`
# runs Batteries' linter frontend over the elaborated `Environment`, covering the
# checks a text-based linter cannot reach: docBlame, unusedArguments, simpNF,
# synTaut and unusedHavesSuffices.
lintDriver = "batteries/runLinter"
lintDriverArgs = ["EllipticPdes"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true

# Upstream Mathlib, pinned to the commit this development was written against.
# The project previously depended on a personal fork carrying five extra files;
# those now live under EllipticPdes/Analysis/, so `lake exe cache get` serves
# every olean and a clean clone needs no fork.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "542645ab80a3ee3a715ad8610b8c0fdac58ba54c"

[[lean_lib]]
name = "EllipticPdes"
