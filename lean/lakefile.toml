name = "EllipticPdes"
version = "0.1.0"
keywords = ["math", "pde", "elliptic"]
defaultTargets = ["EllipticPdes"]

# Environment-level lint gate, mirroring Mathlib's own configuration. `lake lint`
# runs Batteries' linter frontend over the elaborated `Environment`, covering the
# checks a text-based linter cannot reach: docBlame, unusedArguments, simpNF,
# synTaut and unusedHavesSuffices.
lintDriver = "batteries/runLinter"
lintDriverArgs = ["EllipticPdes"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true

# Personal mathlib fork (toolchain v4.31.0-rc1, tracks upstream/stable plus the
# project's own additions, including the Frechet-Kolmogorov / Rellich engine). A
# git require so CI and remote clones can resolve it; the fork adds only a few
# files on top of upstream, so `lake exe cache get` still hits the
# content-addressed upstream cache for every unchanged module.
[[require]]
name = "mathlib"
git = "https://github.com/alejandro-soto-franco/mathlib4.git"
rev = "16a297f1108035c3a8174d68b052f92a991ea7bf"

# `Meridian` is required so this project can be ingested by
# `stratum cite lean-sync` (RDF Turtle dump of the Lean Environment).
[[require]]
name = "Meridian"
git = "https://github.com/alejandro-soto-franco/Meridian.git"
rev = "062e48db13f4b9a21249ec63222ae2adeaad9124"

[[lean_lib]]
name = "EllipticPdes"
