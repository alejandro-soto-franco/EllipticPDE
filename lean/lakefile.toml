name = "EllipticDirichlet"
version = "0.1.0"
keywords = ["math", "pde", "elliptic"]
defaultTargets = ["EllipticDirichlet"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true

# Shared mathlib worktree (toolchain v4.29.1, tracks upstream/stable). Build
# artifacts live at ~/mathlib4-fork-stable/.lake and are reused across every
# downstream Lean project on this toolchain, so no multi-GB rebuild here.
[[require]]
name = "mathlib"
path = "../../mathlib4-fork-stable"

# Meridian (dev/analysis dependency): enables `stratum cite lean-sync` to export
# this project's environment into the bridge oxigraph store for SPARQL
# traversal. Shares the same mathlib worktree, so no second mathlib instance.
[[require]]
name = "Meridian"
path = "../../Meridian"

[[lean_lib]]
name = "EllipticDirichlet"
